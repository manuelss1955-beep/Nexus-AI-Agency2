baseURL = "https://nexus-ai-agency2-production.up.railway.app"
locale = "es-ES"
title = "Nexus AI — Soluciones de Inteligencia Artificial"
theme = "nexus"
defaultContentLanguage = "es"
summaryLength = 25
enableGitInfo = false
disableHugoGeneratorInject = false
enableRobotsTXT = true
ignoreLogs = ['warning-goldmark-raw-html']

[taxonomies]
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputFormats]
  [outputFormats.RSS]
    mediatype = "application/rss"
    baseName = "index"
    isHTML = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
      strikethrough = true
      linkify = true
      table = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "monokai"
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

[params]
  description = "Nexus AI — Agencia líder en inteligencia artificial. Agentes autónomos, integraciones MCP, automatización, chatbots y consultoría IA."
  author = "Nexus AI Agency"
  email = "hola@nexus-ai.agency"
  phone = "+34 900 123 456"
  address = "Madrid, España"
  founded = 2023
  projects = 150
  clients = 40
  countries = 8
  accuracy = 98
  support = "24/7"
  locale = "es_ES"
  siteName = "Nexus AI Agency"

