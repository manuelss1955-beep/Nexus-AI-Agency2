{{ define "head-extra" }}
{{- $root := partial "rootpath.html" . -}}
<link rel="stylesheet" href="{{ $root }}css/blog.css">
{{ end }}

{{ define "main" }}
{{- $root := partial "rootpath.html" . -}}
<section class="page-hero"><div class="container">
  <div class="page-hero__breadcrumb">{{ partial "breadcrumbs.html" . }}</div>
  <h1 class="page-hero__title">{{ .Title }}</h1>
  {{ with .Description }}<p class="page-hero__text">{{ . }}</p>{{ end }}
</div></section>
<section class="section"><div class="container">
  {{ .Content }}
</div></section>
{{ end }}
