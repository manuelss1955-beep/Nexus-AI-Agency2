{{ define "main" }}
{{- $root := partial "rootpath.html" . -}}
<section class="page-hero"><div class="container">
  <div class="page-hero__breadcrumb">{{ partial "breadcrumbs.html" . }}</div>
  <h1 class="page-hero__title">Tags</h1>
  <p class="page-hero__text">{{ len .Data.Terms }} etiquetas en total</p>
</div></section>
<section class="section"><div class="container">
  <div class="grid grid--3">
    {{- range .Data.Terms.Alphabetical }}
    <a href="{{ $root }}tags/{{ .Page.Title | urlize }}/index.html" class="card">
      <div class="card__icon">🏷️</div>
      <h3 class="card__title">{{ .Page.Title }}</h3>
      <p class="card__text">{{ .Count }} artículo{{ if ne .Count 1 }}s{{ end }}</p>
      <span class="card__link">Ver artículos →</span>
    </a>
    {{- end }}
  </div>
</div></section>
{{ end }}
